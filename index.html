<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ちゃばの生存確認。</title>
  <meta name="description" content="日常とライフスタイルをつづるブログ" />

  <!-- ===== フォント読み込み ===== -->
  <!-- 日本語: Meiryo → Hiragino → sans-serif の順でフォールバック -->
  <!-- 英語/数字: DM Sans（モダンで読みやすいサンセリフ体） -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />

  <!-- ===== Supabase SDK ===== -->
  <!-- コメント・リアクションのDB操作に使用 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ===================================================
       CSS変数 — カラーパレットとタイポグラフィの定義
       ここを変更するだけでサイト全体の色調が変わります
    =================================================== */
    :root {
      --color-bg:       #faf8f5;
      --color-surface:  #f5f1eb;
      --color-border:   #e8e0d4;
      --color-text:     #2c2825;
      --color-muted:    #9a8f85;
      --color-accent:   #b8a99a;
      --color-link:     #7a6a5e;
      --color-error:    #c0392b;
      --color-success:  #6a9e7f;

      /* 見出し: DM Sans（英数字）+ Meiryo（日本語） */
      --font-display: 'DM Sans', 'Meiryo', 'Hiragino Kaku Gothic ProN', sans-serif;
      /* 本文: Meiryo を優先 */
      --font-body:    'Meiryo', 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;

      --max-width:       860px;
      --spacing-section: 80px;
    }

    /* ===================================================
       リセット & ベーススタイル
    =================================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background-color: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.9;
      animation: fadeInPage 0.8s ease forwards;
    }

    @keyframes fadeInPage {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ===================================================
       ヘッダー
    =================================================== */
    .site-header {
      padding: 32px 0 28px;
      border-bottom: 1px solid var(--color-border);
    }

    .site-header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .site-title {
      font-family: var(--font-display);
      font-size: clamp(18px, 3vw, 24px);
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--color-text);
      transition: opacity 0.2s;
    }

    .site-title:hover { opacity: 0.7; }

    .social-links {
      display: flex;
      align-items: center;
      gap: 20px;
      list-style: none;
    }

    .social-links a {
      font-family: var(--font-display);
      font-size: 13px;
      letter-spacing: 0.12em;
      color: var(--color-muted);
      transition: color 0.2s;
      position: relative;
    }

    /* ホバー時の下線アニメーション */
    .social-links a::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0;
      width: 0; height: 1px;
      background: var(--color-text);
      transition: width 0.25s ease;
    }

    .social-links a:hover { color: var(--color-text); }
    .social-links a:hover::after { width: 100%; }

    /* ===================================================
       ヒーローセクション
    =================================================== */
    .hero { padding: 72px 0 64px; text-align: center; }

    .hero-heading {
      font-family: var(--font-display);
      font-size: clamp(32px, 6vw, 56px);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.04em;
      line-height: 1.3;
      color: var(--color-text);
      margin-bottom: 20px;
    }

    .hero-sub {
      font-size: 14px;
      color: var(--color-muted);
      letter-spacing: 0.1em;
      margin-bottom: 32px;
    }

    .hero-divider {
      width: 40px; height: 1px;
      background: var(--color-accent);
      margin: 0 auto 32px;
    }

    .hero-desc {
      max-width: 480px;
      margin: 0 auto;
      font-size: 14px;
      color: var(--color-muted);
      line-height: 2;
      letter-spacing: 0.05em;
    }

    /* ===================================================
       記事一覧セクション
    =================================================== */
    .posts-section { padding: 0 0 var(--spacing-section); }

    .section-label {
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 0.25em;
      color: var(--color-muted);
      text-transform: uppercase;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .section-label::after {
      content: '';
      flex: 1; height: 1px;
      background: var(--color-border);
    }

    /* 2列グリッド（スマホは1列） */
    .posts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2px;
    }

    /* ===== 記事カード ===== */
    .post-card {
      background: var(--color-surface);
      padding: 36px 32px 28px;
      position: relative;
      overflow: hidden;
    }

    /* ホバー時の左端ライン装飾 */
    .post-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: var(--color-accent);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.3s ease;
    }

    .post-card:hover { background: var(--color-border); }
    .post-card:hover::before { transform: scaleY(1); }

    .post-category {
      font-family: var(--font-display);
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--color-muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .post-title {
      font-family: var(--font-body);
      font-size: 17px;
      font-weight: 500;
      line-height: 1.6;
      color: var(--color-text);
      margin-bottom: 12px;
      letter-spacing: 0.03em;
    }

    .post-excerpt {
      font-size: 13px;
      color: var(--color-muted);
      line-height: 1.9;
      margin-bottom: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .post-date {
      font-family: var(--font-display);
      font-size: 12px;
      color: var(--color-accent);
      letter-spacing: 0.1em;
      display: block;
      margin-bottom: 20px;
    }

    /* ===================================================
       リアクションボタンエリア
       各記事カード下部に 👍 ❤️ 😊 ボタンを表示
    =================================================== */
    .reactions {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .reaction-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border: 1px solid var(--color-border);
      border-radius: 20px;
      background: var(--color-bg);
      color: var(--color-muted);
      font-size: 13px;
      font-family: var(--font-body);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
      line-height: 1;
    }

    /* リアクション済みの状態 */
    .reaction-btn.active {
      border-color: var(--color-accent);
      background: var(--color-surface);
      color: var(--color-text);
    }

    .reaction-btn:hover {
      border-color: var(--color-accent);
      color: var(--color-text);
    }

    .reaction-count {
      font-size: 12px;
      min-width: 14px;
      text-align: center;
    }

    /* ===================================================
       コメントトグルボタン
    =================================================== */
    .comment-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--color-muted);
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
    }

    .comment-toggle:hover { color: var(--color-text); }

    .comment-badge {
      background: var(--color-border);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 11px;
      font-family: var(--font-display);
    }

    /* ===================================================
       コメントエリア（アコーディオン形式）
       .open クラスで表示/非表示を切り替え
    =================================================== */
    .comment-area {
      display: none;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--color-border);
    }

    .comment-area.open { display: block; }

    /* ===== コメント一覧 ===== */
    .comment-list { list-style: none; margin-bottom: 20px; }

    .comment-item {
      padding: 14px 0;
      border-bottom: 1px solid var(--color-border);
      animation: fadeInComment 0.4s ease;
    }

    @keyframes fadeInComment {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .comment-item:last-child { border-bottom: none; }

    .comment-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .comment-username {
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text);
    }

    .comment-time {
      font-family: var(--font-display);
      font-size: 11px;
      color: var(--color-accent);
    }

    .comment-body {
      font-size: 13px;
      color: var(--color-muted);
      line-height: 1.8;
      word-break: break-word;
    }

    /* コメントがない場合 */
    .comment-empty {
      font-size: 13px;
      color: var(--color-accent);
      text-align: center;
      padding: 16px 0;
    }

    /* ===== コメント投稿フォーム ===== */
    .comment-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* 入力欄の共通スタイル */
    .comment-form input,
    .comment-form textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: 13px;
      line-height: 1.6;
      transition: border-color 0.2s;
      resize: none;
    }

    .comment-form input:focus,
    .comment-form textarea:focus {
      outline: none;
      border-color: var(--color-accent);
    }

    /* バリデーションエラー時 */
    .comment-form input.error,
    .comment-form textarea.error { border-color: var(--color-error); }

    .field-error {
      font-size: 11px;
      color: var(--color-error);
      display: none;
      margin-top: -4px;
    }

    .comment-form textarea { min-height: 80px; }

    /* 投稿ボタン */
    .comment-submit {
      align-self: flex-end;
      padding: 8px 20px;
      background: var(--color-text);
      color: var(--color-bg);
      border: none;
      border-radius: 4px;
      font-family: var(--font-body);
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .comment-submit:hover { opacity: 0.75; }
    .comment-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    /* 送信完了メッセージ */
    .submit-success {
      font-size: 12px;
      color: var(--color-success);
      text-align: right;
      display: none;
    }

    /* ===================================================
       フッター
    =================================================== */
    .site-footer {
      padding: 40px 0;
      border-top: 1px solid var(--color-border);
      text-align: center;
    }

    .footer-title {
      font-family: var(--font-display);
      font-size: 14px;
      font-style: italic;
      color: var(--color-muted);
      letter-spacing: 0.1em;
      margin-bottom: 16px;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 24px;
      list-style: none;
      margin-bottom: 24px;
    }

    .footer-links a {
      font-family: var(--font-display);
      font-size: 12px;
      letter-spacing: 0.15em;
      color: var(--color-muted);
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--color-text); }

    .footer-copy {
      font-size: 11px;
      color: var(--color-accent);
      letter-spacing: 0.1em;
    }

    /* ===================================================
       レスポンシブ対応 — 600px以下
    =================================================== */
    @media (max-width: 600px) {
      .site-header .container { flex-direction: column; align-items: flex-start; gap: 12px; }
      .social-links { gap: 14px; }
      .hero { padding: 48px 0 40px; }
      .posts-grid { grid-template-columns: 1fr; }
      .reaction-btn { font-size: 12px; padding: 4px 10px; }
    }
  </style>
</head>
<body>

  <!-- ===================================================
       ヘッダー
       各リンクの href="" をご自身のURLに変更してください
  =================================================== -->
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-title">ちゃばの生存確認。</a>
      <nav aria-label="外部リンク">
        <ul class="social-links">
          <li><a href="https://note.com/" target="_blank" rel="noopener noreferrer">note</a></li>
          <li><a href="https://youtube.com/" target="_blank" rel="noopener noreferrer">YouTube</a></li>
          <li><a href="https://gravity.tv/" target="_blank" rel="noopener noreferrer">GRAVITY</a></li>
        </ul>
      </nav>
    </div>
  </header>


  <!-- ===================================================
       ヒーローセクション
       テキストはご自由に書き換えてください
  =================================================== -->
  <section class="hero">
    <div class="container">
      <h1 class="hero-heading">still here, still going.</h1>
      <p class="hero-sub">日常 / ライフスタイル / きろく</p>
      <div class="hero-divider" aria-hidden="true"></div>
      <p class="hero-desc">
        生きてます。ちゃんと。<br />
        日々のできごと、好きなもの、ふと思ったことを<br />
        ここに置いていきます。
      </p>
    </div>
  </section>


  <!-- ===================================================
       記事一覧
       Notion API から動的に記事カードを生成します
       記事はNotionのデータベースで管理・追加できます
  =================================================== -->
  <main class="posts-section">
    <div class="container">
      <p class="section-label">latest posts</p>
      <!-- ローディング中はスピナーを表示、取得後にJSでカードを生成 -->
      <div class="posts-grid" id="posts-grid">
        <p class="posts-loading">記事を読み込んでいます</p>
      </div>

      </div><!-- /#posts-grid -->
    </div><!-- /.container -->
  </main>


  <!-- ===================================================
       フッター
  =================================================== -->
  <footer class="site-footer">
    <div class="container">
      <p class="footer-title">ちゃばの生存確認。</p>
      <ul class="footer-links">
        <li><a href="https://note.com/" target="_blank" rel="noopener noreferrer">note</a></li>
        <li><a href="https://youtube.com/" target="_blank" rel="noopener noreferrer">YouTube</a></li>
        <li><a href="https://gravity.tv/" target="_blank" rel="noopener noreferrer">GRAVITY</a></li>
      </ul>
      <p class="footer-copy">&copy; 2025 ちゃばの生存確認。</p>
    </div>
  </footer>


  <!-- ===================================================
       JavaScript — Notion記事取得 + コメント・リアクション機能
  =================================================== -->
  <script>
  /* =====================================================
     ⚠️ 設定値（必ず書き換えてください）
  ===================================================== */
  // Cloudflare Workers の URL（デプロイ後に取得）
  // 例: https://your-worker.your-account.workers.dev
  const WORKER_URL = 'YOUR_WORKER_URL';

  // Supabase 接続設定
  const SUPABASE_URL      = 'YOUR_SUPABASE_URL';
  const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

  /* =====================================================
     Supabase クライアント初期化
     未設定の場合はコメント・リアクション機能をスキップ
  ===================================================== */
  const isSupabaseReady =
    SUPABASE_URL      !== 'YOUR_SUPABASE_URL' &&
    SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY';

  let db = null;
  if (isSupabaseReady) {
    db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }

  /* =====================================================
     ユーティリティ関数
  ===================================================== */

  // 日時を「○分前」形式に変換
  function timeAgo(dateStr) {
    const diff = (Date.now() - new Date(dateStr)) / 1000;
    if (diff < 60)         return 'たった今';
    if (diff < 3600)       return Math.floor(diff / 60) + '分前';
    if (diff < 86400)      return Math.floor(diff / 3600) + '時間前';
    if (diff < 86400 * 30) return Math.floor(diff / 86400) + '日前';
    return new Date(dateStr).toLocaleDateString('ja-JP');
  }

  // XSS対策: HTMLエスケープ
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  // 日付を「Month DD, YYYY」形式に変換
  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  /* =====================================================
     Notion から記事一覧を取得して描画する
  ===================================================== */
  async function loadPosts() {
    const grid = document.getElementById('posts-grid');

    // Worker URL が未設定の場合はガイダンスを表示
    if (WORKER_URL === 'YOUR_WORKER_URL') {
      grid.innerHTML = '<p class="posts-error">⚠️ WORKER_URL を設定してください（仕様書を参照）</p>';
      return;
    }

    try {
      // Cloudflare Workers 経由で記事一覧を取得
      const res = await fetch(`${WORKER_URL}/posts`);
      if (!res.ok) throw new Error('API error: ' + res.status);

      const { posts } = await res.json();

      if (!posts || posts.length === 0) {
        grid.innerHTML = '<p class="posts-error">記事がまだありません</p>';
        return;
      }

      // 各記事カードをHTMLとして生成
      grid.innerHTML = posts.map(post => buildPostCard(post)).join('');

      // 生成したカードにコメント・リアクション機能を初期化
      grid.querySelectorAll('.post-card').forEach(card => {
        initCard(card).catch(err => console.error('カード初期化エラー:', err));
      });

    } catch (err) {
      console.error('記事取得エラー:', err);
      grid.innerHTML = '<p class="posts-error">記事の読み込みに失敗しました。しばらくしてから再試行してください。</p>';
    }
  }

  /* =====================================================
     記事カードのHTMLを生成する
     post: { id, title, date, category, excerpt, cover }
  ===================================================== */
  function buildPostCard(post) {
    // カバー画像（あれば表示）
    const coverHtml = post.cover
      ? `<img class="post-cover" src="${escapeHtml(post.cover)}" alt="${escapeHtml(post.title)}" loading="lazy" />`
      : '';

    // 記事詳細ページへのリンク（クエリパラメータでページIDを渡す）
    const postUrl = `post.html?id=${encodeURIComponent(post.id)}`;

    return `
      <article class="post-card" data-post-id="${escapeHtml(post.id)}">
        ${coverHtml}
        <p class="post-category">${escapeHtml(post.category)}</p>
        <h2 class="post-title">
          <a href="${postUrl}" class="post-link">${escapeHtml(post.title)}</a>
        </h2>
        <p class="post-excerpt">${escapeHtml(post.excerpt)}</p>
        <time class="post-date" datetime="${escapeHtml(post.date)}">${formatDate(post.date)}</time>

        <!-- リアクションボタン -->
        <div class="reactions" role="group" aria-label="リアクション">
          <button class="reaction-btn" data-emoji="👍" aria-label="いいね">👍 <span class="reaction-count">0</span></button>
          <button class="reaction-btn" data-emoji="❤️" aria-label="ハート">❤️ <span class="reaction-count">0</span></button>
          <button class="reaction-btn" data-emoji="😊" aria-label="笑顔">😊 <span class="reaction-count">0</span></button>
        </div>

        <!-- コメントトグル -->
        <button class="comment-toggle" aria-expanded="false">💬 コメント <span class="comment-badge">0</span></button>

        <!-- コメントエリア -->
        <div class="comment-area" aria-hidden="true">
          <ul class="comment-list"></ul>
          <p class="comment-empty">まだコメントはありません</p>
          <div class="comment-form">
            <input type="text" class="input-username" placeholder="ユーザー名（必須）" maxlength="30" aria-label="ユーザー名" />
            <span class="field-error" data-for="username">ユーザー名を入力してください</span>
            <textarea class="input-comment" placeholder="コメントを入力してください（必須）" maxlength="500" aria-label="コメント内容"></textarea>
            <span class="field-error" data-for="comment">コメントを入力してください</span>
            <button class="comment-submit">投稿する</button>
            <p class="submit-success">✓ コメントを投稿しました</p>
          </div>
        </div>
      </article>
    `;
  }

  /* =====================================================
     各記事カードのコメント・リアクション機能を初期化
     （Supabase 連携部分 — 以前のコードと同じロジック）
  ===================================================== */
  async function initCard(card) {
    const postId        = card.dataset.postId;
    const commentList   = card.querySelector('.comment-list');
    const commentEmpty  = card.querySelector('.comment-empty');
    const commentBadge  = card.querySelector('.comment-badge');
    const commentToggle = card.querySelector('.comment-toggle');
    const commentArea   = card.querySelector('.comment-area');
    const inputUsername = card.querySelector('.input-username');
    const inputComment  = card.querySelector('.input-comment');
    const submitBtn     = card.querySelector('.comment-submit');
    const successMsg    = card.querySelector('.submit-success');
    const errUsername   = card.querySelector('[data-for="username"]');
    const errComment    = card.querySelector('[data-for="comment"]');
    const reactionBtns  = card.querySelectorAll('.reaction-btn');

    async function loadComments() {
      if (!db) return;
      const { data, error } = await db.from('comments').select('*')
        .eq('post_id', postId).order('created_at', { ascending: true });
      if (error) { console.error('コメント取得エラー:', error); return; }
      commentList.innerHTML = '';
      if (data.length === 0) {
        commentEmpty.style.display = 'block';
      } else {
        commentEmpty.style.display = 'none';
        data.forEach(c => {
          const li = document.createElement('li');
          li.className = 'comment-item';
          li.innerHTML =
            '<div class="comment-header">' +
              '<span class="comment-username">' + escapeHtml(c.username) + '</span>' +
              '<time class="comment-time">' + timeAgo(c.created_at) + '</time>' +
            '</div>' +
            '<p class="comment-body">' + escapeHtml(c.body) + '</p>';
          commentList.appendChild(li);
        });
      }
      commentBadge.textContent = data.length;
    }

    async function loadReactions() {
      if (!db) return;
      const { data, error } = await db.from('reactions').select('emoji, count').eq('post_id', postId);
      if (error) { console.error('リアクション取得エラー:', error); return; }
      reactionBtns.forEach(btn => {
        const row = data.find(r => r.emoji === btn.dataset.emoji);
        btn.querySelector('.reaction-count').textContent = row ? row.count : 0;
      });
    }

    commentToggle.addEventListener('click', () => {
      const isOpen = commentArea.classList.toggle('open');
      commentToggle.setAttribute('aria-expanded', isOpen);
      commentArea.setAttribute('aria-hidden', !isOpen);
    });

    submitBtn.addEventListener('click', async () => {
      const username = inputUsername.value.trim();
      const body     = inputComment.value.trim();
      let hasError   = false;

      if (!username) { inputUsername.classList.add('error'); errUsername.style.display = 'block'; hasError = true; }
      else           { inputUsername.classList.remove('error'); errUsername.style.display = 'none'; }

      if (!body)     { inputComment.classList.add('error'); errComment.style.display = 'block'; hasError = true; }
      else           { inputComment.classList.remove('error'); errComment.style.display = 'none'; }

      if (hasError) return;
      if (!db) { alert('Supabaseの設定が完了していないため投稿できません。'); return; }

      submitBtn.disabled = true;
      submitBtn.textContent = '投稿中…';

      const { error } = await db.from('comments').insert({
        post_id: postId, username, body, created_at: new Date().toISOString()
      });

      submitBtn.disabled = false;
      submitBtn.textContent = '投稿する';

      if (error) { console.error('投稿エラー:', error); alert('投稿に失敗しました。'); return; }

      inputUsername.value = '';
      inputComment.value  = '';
      successMsg.style.display = 'block';
      setTimeout(() => { successMsg.style.display = 'none'; }, 3000);
      await loadComments();
    });

    reactionBtns.forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!db) return;
        const isActive = btn.classList.toggle('active');
        const { error } = await db.rpc('upsert_reaction', {
          p_post_id: postId, p_emoji: btn.dataset.emoji, p_delta: isActive ? 1 : -1
        });
        if (error) { console.error('リアクションエラー:', error); btn.classList.toggle('active'); return; }
        await loadReactions();
      });
    });

    await loadComments();
    await loadReactions();
  }

  /* =====================================================
     ページ読み込み後に記事一覧を取得して描画
  ===================================================== */
  document.addEventListener('DOMContentLoaded', () => {
    loadPosts();
  });
  </script>

</body>
</html>
